<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency converter</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="container">
        <div id="box">
            <h2>Currency Converter</h2>

                <div id="inputBox">
                    <label for="" id="amount">Enter Amount</label>                
                    <input id="user_value" type="number">
                </div>

                <div id="selectCountry">
                    <div>
                        <label for="">From</label>
                        <select name="" id="from_dropDown"></select>
                    </div>

                    <div id="exchangeIcon"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>
                    
                    <div>
                        <label for="">To</label>
                        <select name="" id="to_dropDown"></select>
                    </div>
                </div>

            <p id="displayText"></p>

            <button id="button">Get Exchange Rate</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
